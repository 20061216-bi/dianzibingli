<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子病历系统 - 登录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-bg: #0a0e27;
            --secondary-bg: #1a1f3a;
            --accent-patient: #06b6d4;
            --accent-nurse: #a855f7;
            --accent-doctor: #10b981;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            line-height: 1.6;
        }

        header {
            background: rgba(26, 31, 58, 0.8);
            backdrop-filter: blur(10px);
            padding: 1.5rem 0;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--active-color), var(--active-color));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 600;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--text-primary);
        }

        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 4rem 2rem;
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            background: rgba(26, 31, 58, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .role-tag {
            display: inline-block;
            padding: 0.3rem 1rem;
            border-radius: 20px;
            background: rgba(var(--active-rgb), 0.1);
            color: var(--active-color);
            font-size: 0.875rem;
            font-weight: 600;
            border: 1px solid var(--active-color);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-control {
            width: 100%;
            padding: 0.875rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--active-color);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .remember-me input {
            accent-color: var(--active-color);
        }

        .forgot-password {
            color: var(--active-color);
            text-decoration: none;
            transition: opacity 0.3s;
        }

        .forgot-password:hover {
            opacity: 0.8;
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
            background: var(--active-color);
            color: white;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(var(--active-rgb), 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        footer {
            background: rgba(10, 14, 39, 0.8);
            padding: 2rem;
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.875rem;
            margin-top: auto;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .header-content {
                flex-direction: column;
                gap: 1rem;
            }
            nav ul {
                flex-direction: column;
                gap: 0.5rem;
                text-align: center;
            }
            .login-container {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">⚕️</div>
                <div class="logo-text">
                    <h1>电子病历系统</h1>
                    <p>智能医疗管理平台</p>
                </div>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">返回首页</a></li>
                    <li><a href="#support">技术支持</a></li>
                    <li><a href="#contact">联系我们</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="login-container">
            <div class="login-header">
                <h2>账号登录</h2>
                <div class="role-tag" id="roleTag">患者端</div>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">账号</label>
                    <input type="text" id="username" class="form-control" placeholder="请输入账号" required>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <input type="password" id="password" class="form-control" placeholder="请输入密码" required>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="remember">
                        记住我
                    </label>
                    <a href="#" class="forgot-password">忘记密码？</a>
                </div>
                
                <button type="submit" class="login-button" id="loginButton">登录系统</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 电子病历系统 | 版权所有 | 技术支持热线：400-XXX-XXXX</p>
        <p style="margin-top: 0.5rem; font-size: 0.75rem;">本系统仅供医疗专业人员使用，请妥善保管您的账号信息</p>
    </footer>

    <script>
        // 从URL参数获取角色类型
        const urlParams = new URLSearchParams(window.location.search);
        const role = urlParams.get('role') || 'patient';
        
        // 角色配置
        const roles = {
            patient: {
                name: '患者端',
                color: '#06b6d4',
                rgb: '6, 182, 212',
                placeholder: '请输入病历号/用户名',
                page: 'patient.html'
            },
            nurse: {
                name: '护士端',
                color: '#a855f7',
                rgb: '168, 85, 247',
                placeholder: '请输入工号/用户名',
                page: 'nurse.html'
            },
            doctor: {
                name: '医生端',
                color: '#10b981',
                rgb: '16, 185, 129',
                placeholder: '请输入工号/用户名',
                page: 'doctor.html'
            }
        };
        
        // 设置当前角色样式和内容
        const currentRole = roles[role] || roles.patient;
        document.documentElement.style.setProperty('--active-color', currentRole.color);
        document.documentElement.style.setProperty('--active-rgb', currentRole.rgb);
        
        // 更新角色标签
        document.getElementById('roleTag').textContent = currentRole.name;
        
        // 更新账号输入框占位符
        document.getElementById('username').placeholder = currentRole.placeholder;
        
        // 登录表单提交逻辑
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            if (!username || !password) {
                alert('请输入账号和密码');
                return;
            }
            
            // 模拟登录
            const loginButton = document.getElementById('loginButton');
            loginButton.textContent = '登录中...';
            loginButton.disabled = true;
            
            setTimeout(() => {
                // 测试账号：123/123
                if (username === '123' && password === '123') {
                    alert(`登录成功！正在跳转到${currentRole.name}...`);
                    window.location.href = currentRole.page;
                } else {
                    alert('账号或密码错误！\n测试账号：123，密码：123');
                    loginButton.textContent = '登录系统';
                    loginButton.disabled = false;
                }
            }, 1000);
        });
        
        // 忘记密码链接
        document.querySelector('.forgot-password').addEventListener('click', function(e) {
            e.preventDefault();
            alert(`即将跳转到${currentRole.name}密码重置页面`);
        });
        
        // 测试账号提示
        window.addEventListener('DOMContentLoaded', function() {
            const tip = document.createElement('div');
            tip.style.cssText = `
                position: fixed; bottom: 80px; right: 20px;
                background: rgba(var(--active-rgb), 0.2);
                border: 1px solid var(--active-color);
                border-radius: 8px; padding: 10px 15px;
                font-size: 12px; color: var(--active-color);
                z-index: 1000; backdrop-filter: blur(5px);
                max-width: 200px;
            `;
            tip.innerHTML = `<strong>测试账号：</strong><br>账号：123<br>密码：123`;
            document.body.appendChild(tip);
        });
    </script>
</body>
</html>
